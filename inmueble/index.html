<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inmueble — Statetty</title>
  <meta name="description" content="Información completa del inmueble">
  <meta name="robots" content="index, follow">

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png">
  <link rel="manifest" href="/assets/images/favicon/site.webmanifest">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/inmueble.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    :root {
      --blue:       #17baef;
      --blue-dark:  #074f66;
      --blue-light: #6dd0f5;
      --yellow:     #eebf3f;
      --yellow-pale:#f4d67a;
      --font-head:  'Montserrat', sans-serif;
      --font-body:  'Lato', sans-serif;
      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  20px;
      --radius-xl:  32px;
      --transition: 0.25s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      color: #444;
      background: #fff;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    a { color: var(--blue); text-decoration: none; transition: var(--transition); }
    a:hover { color: var(--blue-dark); }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PM2Q0F233Y"></script>
  <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-PM2Q0F233Y');</script>
</head>
<body>

  <!-- ==================== CUSTOM HEADER ==================== -->
  <header class="inm-header" id="inmHeader">
    <div class="inm-header-inner">
      <a class="inm-header-back" href="javascript:history.back()">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Volver
      </a>
      <a class="inm-header-logo" href="/">Statetty</a>
    </div>
  </header>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="inmueble-page">

    <!-- Loading -->
    <div class="inmueble-loading" id="inm-loading">
      <div class="inmueble-spinner"></div>
      <p style="color:#888;font-size:.9rem;">Cargando información del inmueble…</p>
    </div>

    <!-- Error -->
    <div class="inmueble-error inm-hidden" id="inm-error">
      <div class="inmueble-error-icon">!</div>
      <h2 id="inm-error-title">Error</h2>
      <p id="inm-error-msg">Ocurrió un error inesperado.</p>
    </div>

    <!-- Content -->
    <div class="inmueble-container inm-hidden" id="inm-content">
      <div class="inmueble-layout">

        <div class="inmueble-main">
          <!-- Gallery -->
          <section class="inm-gallery" id="inm-gallery">
            <div class="inm-gallery-main">
              <img id="inm-main-img" src="" alt="Foto principal">
              <span class="inm-gallery-count" id="inm-gal-count">0 / 0</span>
            </div>
            <div class="inm-gallery-thumbs" id="inm-thumbs"></div>
          </section>

          <!-- Header Info -->
          <section class="inm-header-info">
            <h1 id="inm-title">Inmueble</h1>
            <div class="inm-price" id="inm-price"></div>
            <p class="inm-address" id="inm-address"></p>
          </section>

          <!-- Features -->
          <section>
            <h2 class="inm-section-title">Características</h2>
            <div class="inm-features" id="inm-features"></div>
          </section>

          <!-- Description -->
          <section>
            <h2 class="inm-section-title">Descripción</h2>
            <p class="inm-description" id="inm-desc"></p>
          </section>

          <!-- Map -->
          <section class="inm-map-section inm-hidden" id="inm-map-section">
            <h2 class="inm-section-title">Ubicación</h2>
            <div class="inm-map-container" id="inm-map"></div>
            <p class="inm-map-hint">Hacé clic en el marcador para abrir en Google Maps</p>
          </section>
        </div>

        <!-- Sidebar Contact Form -->
        <aside class="inm-sidebar" id="inm-sidebar">
          <div class="inm-contact-card">
            <h3 class="inm-contact-card-title">Pregunta al anunciante</h3>
            <textarea class="inm-form-textarea" id="inm-msg" rows="4">me interesa este inmueble ¿Podría enviarme información?</textarea>
            <input type="email" class="inm-form-input" id="inm-email" placeholder="Tu email">
            <div class="inm-form-phone-group">
              <select class="inm-form-select" id="inm-phone-code">
                <option value="+591">+591 (Bolivia)</option>
                <option value="+51">+51 (Perú)</option>
                <option value="+54">+54 (Argentina)</option>
                <option value="+55">+55 (Brasil)</option>
                <option value="+56">+56 (Chile)</option>
                <option value="+57">+57 (Colombia)</option>
                <option value="+1">+1 (US/Canadá)</option>
                <option value="+34">+34 (España)</option>
                <option value="+52">+52 (México)</option>
                <option value="+598">+598 (Uruguay)</option>
                <option value="+58">+58 (Venezuela)</option>
              </select>
              <input type="tel" class="inm-form-input" id="inm-phone" placeholder="Tu celular *" required>
            </div>
            <input type="text" class="inm-form-input" id="inm-name" placeholder="Tu nombre">
            <label class="inm-form-checkbox" id="inm-privacy-label">
              <input type="checkbox" id="inm-privacy" required>
              <span>Aceptar la <a href="https://statetty.com/politica_de_privacidad.html" target="_blank" rel="noopener">política de privacidad</a> y las <a href="https://statetty.com/terminos_y_condiciones.html" target="_blank" rel="noopener">condiciones generales</a></span>
            </label>
            <button class="inm-form-submit" id="inm-submit">Contactar al anunciante</button>
          </div>
        </aside>

      </div>
    </div>
  </main>

  <!-- ==================== CONTACT BAR (mobile only) ==================== -->
  <div class="inm-contact-bar inm-hidden" id="inm-contact-bar">
    <span class="inm-contact-text" id="inmContactBtn">Pregunta al anunciante</span>
  </div>

  <!-- ==================== LIGHTBOX ==================== -->
  <div class="inm-lightbox" id="inm-lightbox">
    <button class="inm-lightbox-close" id="inm-lb-close">&times;</button>
    <button class="inm-lightbox-prev" id="inm-lb-prev">&lsaquo;</button>
    <button class="inm-lightbox-next" id="inm-lb-next">&rsaquo;</button>
    <img id="inm-lb-img" src="" alt="Foto">
    <span class="inm-lightbox-counter" id="inm-lb-count"></span>
  </div>

  <!-- ==================== CUSTOM FOOTER ==================== -->
  <footer class="inm-footer">
    <div class="inm-footer-inner">
      <p class="inm-footer-copy">&copy; <span id="inm-footer-year">2026</span> Statetty</p>
      <a href="/">Ir al inicio</a>
    </div>
  </footer>

  <!-- ==================== CONFIG ==================== -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="../assets/js/config.js"></script>

  <!-- ==================== MAIN JS ==================== -->
  <script src="assets/js/inmueble.js"></script>

  <!-- ==================== CONTACT FORM (WhatsApp handoff) ==================== -->
  <script>
  (function () {
    'use strict';

    var FEEDCLICK_ENDPOINT = 'statetty/feedclick';
    var FEEDCLICK_FALLBACK_URL = 'https://api.statetty.com/api/statetty/feedclick';
    var STORAGE_KEY = 'statetty_contact_form';

    function getPropertyId() {
      var params = new URLSearchParams(window.location.search);
      return params.get('_id') || params.get('p') || '';
    }

    function getFirstPhotoUrl() {
      var main = document.getElementById('inm-main-img');
      if (main && main.src) return main.src;
      var thumb = document.querySelector('#inm-thumbs img');
      if (thumb && thumb.src) return thumb.src;
      return '';
    }

    function setFieldInvalid(el, invalid) {
      if (!el) return;
      el.style.borderColor = invalid ? '#e53e3e' : '';
    }

    function setCheckboxInvalid(checkboxEl, labelEl, invalid) {
      if (checkboxEl) checkboxEl.style.outline = invalid ? '2px solid #e53e3e' : '';
      if (labelEl) labelEl.style.color = invalid ? '#e53e3e' : '';
    }

    function buildFeedclickUrl() {
      var base = window.STATETTY_CONFIG ? STATETTY_CONFIG.WS_API_BASE : '';
      return base ? (base + FEEDCLICK_ENDPOINT) : FEEDCLICK_FALLBACK_URL;
    }

    function loadSavedForm() {
      try {
        var raw = window.localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        console.warn('STATETTY: no se pudo leer el formulario guardado', err);
        return null;
      }
    }

    function saveForm(data) {
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (err) {
        console.warn('STATETTY: no se pudo guardar el formulario', err);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      var submitBtn = document.getElementById('inm-submit');
      if (!submitBtn) return;

      var msgEl = document.getElementById('inm-msg');
      var emailEl = document.getElementById('inm-email');
      var phoneCodeEl = document.getElementById('inm-phone-code');
      var phoneEl = document.getElementById('inm-phone');
      var nameEl = document.getElementById('inm-name');
      var privacyEl = document.getElementById('inm-privacy');
      var privacyLabelEl = document.getElementById('inm-privacy-label');

      // Restore previously entered contact info (message default stays untouched
      // unless the user had customized it before).
      var saved = loadSavedForm();
      if (saved) {
        if (saved.email) emailEl.value = saved.email;
        if (saved.phoneCode) phoneCodeEl.value = saved.phoneCode;
        if (saved.phone) phoneEl.value = saved.phone;
        if (saved.nombre) nameEl.value = saved.nombre;
        if (saved.mensaje) msgEl.value = saved.mensaje;
      }

      function persistCurrentValues() {
        saveForm({
          email: emailEl.value.trim(),
          phoneCode: phoneCodeEl.value,
          phone: phoneEl.value.trim(),
          nombre: nameEl.value.trim(),
          mensaje: msgEl.value
        });
      }

      [msgEl, emailEl, phoneCodeEl, phoneEl, nameEl].forEach(function (el) {
        if (!el) return;
        var evt = (el.tagName === 'SELECT') ? 'change' : 'input';
        el.addEventListener(evt, persistCurrentValues);
      });

      // Clear invalid state as the user fixes things
      if (phoneEl) phoneEl.addEventListener('input', function () { setFieldInvalid(phoneEl, false); });
      if (privacyEl) privacyEl.addEventListener('change', function () {
        if (privacyEl.checked) setCheckboxInvalid(privacyEl, privacyLabelEl, false);
      });

      submitBtn.addEventListener('click', function () {
        var mensaje = (msgEl && msgEl.value || '').trim();
        var email = (emailEl && emailEl.value || '').trim();
        var phone = (phoneEl && phoneEl.value || '').trim();
        var nombre = (nameEl && nameEl.value || '').trim();
        var privacyOk = !!(privacyEl && privacyEl.checked);

        var valid = true;

        setFieldInvalid(phoneEl, false);
        setCheckboxInvalid(privacyEl, privacyLabelEl, false);

        if (!phone) {
          setFieldInvalid(phoneEl, true);
          valid = false;
        }
        if (!privacyOk) {
          setCheckboxInvalid(privacyEl, privacyLabelEl, true);
          valid = false;
        }

        if (!valid) {
          alert('Por favor completá tu celular y aceptá la política de privacidad y las condiciones generales antes de continuar.');
          return;
        }

        var propertyId = getPropertyId();
        if (!propertyId) {
          alert('No se pudo identificar el inmueble. Por favor recargá la página e intentá nuevamente.');
          return;
        }

        var fullPhone = (phoneCodeEl ? phoneCodeEl.value : '') + phone;
        var url = buildFeedclickUrl();

        persistCurrentValues();

        console.log('STATETTY: enviando consulta a', url);

        var opts = {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': '1'
          },
          body: JSON.stringify({
            inmueble_id: propertyId,
            mensaje: mensaje,
            email: email,
            phone: fullPhone,
            nombre: nombre
          })
        };

        var controller, timeout;
        if (typeof AbortController !== 'undefined') {
          controller = new AbortController();
          timeout = setTimeout(function () { controller.abort(); }, 20000);
          opts.signal = controller.signal;
        }

        var originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Enviando…';

        fetch(url, opts)
          .then(function (res) {
            if (opts.signal) clearTimeout(timeout);
            return res.json().then(function (body) {
              return { status: res.status, ok: res.ok, body: body };
            });
          })
          .then(function (result) {
            var body = result.body || {};
            if (result.ok && body.ok === true) {
              var payload = body.data || {};
              var agentName = payload.agentName || '';
              var agentNameCorto = agentName.trim().split(/\s+/)[0] || '';
              var agentPhon = payload.agentPhon != null ? String(payload.agentPhon) : '';

              var fotoUrl = getFirstPhotoUrl();
              var paginaUrl = 'https://statetty.com/inmueble/?_id=' + propertyId;

              var textoWhatsapp =
                'Hola ' + agentNameCorto + '\n' +
                'Me llamo ' + nombre + ', ' + mensaje + ',\n' +
                'Foto: ' + fotoUrl + '\n' +
                'Página: ' + paginaUrl;

              var agentPhonLimpio = agentPhon.replace(/^\+/, '').replace(/\D/g, '');
              var waUrl = 'https://wa.me/' + agentPhonLimpio + '?text=' + encodeURIComponent(textoWhatsapp);

              window.open(waUrl, '_blank');
            } else {
              console.warn('STATETTY: feedclick error', body);
              alert('No pudimos enviar tu consulta. Por favor intentá nuevamente en unos minutos.');
            }
          })
          .catch(function (err) {
            if (opts.signal) clearTimeout(timeout);
            console.warn('STATETTY: feedclick fetch error', err);
            if (err.name === 'AbortError') {
              alert('El servidor tardó demasiado en responder. Por favor intentá nuevamente.');
            } else {
              alert('Ocurrió un error de conexión. Por favor intentá nuevamente.');
            }
          })
          .finally(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
          });
      });
    });
  })();
  </script>
</body>
</html>
