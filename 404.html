<div class="container">
  <h1>404</h1>

  <p><strong>La página no se encuentra</strong></p>

</div>

<script>
(function() {
  var m = window.location.pathname.match(/^\/inmueble\/p\/([^\/]+)\/?$/);
  if (m) {
    var id = m[1];
    window.location.replace('/inmueble/' + encodeURIComponent(id));
  }
})();
</script>
