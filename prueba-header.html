<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statetty · Header</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<style>
:root {
  --blue:       #17baef;
  --blue-dark:  #074f66;
  --blue-light: #6dd0f5;
  --yellow:     #eebf3f;
  --yellow-pale:#f4d67a;
  --font-head:  'Montserrat', sans-serif;
  --font-body:  'Lato', sans-serif;
  --radius-sm:  6px;
  --transition: 0.25s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-body); color: #444;
  background: #f5f5f5; padding-top: 70px;
}
a { color: var(--blue); text-decoration: none; transition: var(--transition); }
.container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
.section { padding: 60px 0; }
.section h2 { font-family: var(--font-head); color: var(--blue-dark); text-align: center; }

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--blue); transition: var(--transition);
}
.header.scrolled { background: rgba(7,79,102,.97); backdrop-filter: blur(8px); box-shadow: 0 2px 20px rgba(0,0,0,.12); }
.header .container {
  display: flex; align-items: center;
  justify-content: space-between; height: 64px;
}
.header-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-head); font-weight: 800;
  font-size: 1.25rem; color: var(--white, #fff);
}
.header-logo:hover { color: var(--yellow); }
.header-logo img { width: 28px; height: 28px; object-fit: contain; }
.header-logo .highlight { color: var(--yellow); }

.header-nav { display: flex; align-items: center; gap: 8px; }
.header-nav a {
  font-family: var(--font-head); font-weight: 600;
  font-size: .82rem; text-transform: uppercase; letter-spacing: .04em;
  color: rgba(255,255,255,.80); padding: 8px 14px; border-radius: var(--radius-sm);
  transition: var(--transition);
}
.header-nav a:hover,
.header-nav a.active { color: #fff; background: rgba(255,255,255,.12); }
.header-nav .btn-nav-cta {
  background: var(--yellow); color: var(--blue-dark);
  padding: 8px 20px; border-radius: 50px; font-weight: 700;
}
.header-nav .btn-nav-cta:hover { background: var(--yellow-pale); color: var(--blue-dark); }
.nav-toggle {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; cursor: pointer; padding: 6px;
}
.nav-toggle span { display: block; width: 24px; height: 2px; background: #fff; border-radius: 2px; }

@media (max-width: 768px) {
  .nav-toggle { display: flex; }
  .header-nav {
    position: fixed; top: 64px; left: 0; right: 0;
    flex-direction: column; background: var(--blue);
    padding: 16px 24px; gap: 4px;
    transform: translateY(-120%); opacity: 0;
    pointer-events: none; transition: var(--transition);
    border-bottom: 1px solid rgba(255,255,255,.10);
  }
  .header-nav.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .header-nav a { width: 100%; padding: 12px 14px; }
}
@media (max-width: 480px) { .header-nav .btn-nav-cta { text-align: center; } }
</style>
</head>
<body>
<header class="header" id="header">
  <div class="container">
    <a class="header-logo" href="#inicio">
      <img src="/assets/images/favicon/favicon.ico" alt="" width="28" height="28" onerror="this.style.display='none'">
      State<span class="highlight">tty</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Menú"><span></span><span></span><span></span></button>
    <nav class="header-nav" id="headerNav">
      <a href="#inicio" class="active">Inicio</a>
      <a href="#about">Acerca de</a>
      <a href="#beneficios">Beneficios</a>
      <a href="#tarifas">Tarifas</a>
      <a href="#testimonios">Testimonios</a>
      <a href="#faq">FAQ</a>
      <a href="#blog">Blog</a>
      <a href="#contacto" class="btn-nav-cta">Empezá ahora</a>
    </nav>
  </div>
</header>
<section class="section"><div class="container"><h2>Header con nueva paleta</h2><p style="text-align:center;color:#777;margin-top:12px">Hacé scroll para ver el efecto de fondo sólido.</p></div></section>
<script>
const h=document.getElementById('header');
window.addEventListener('scroll',()=>{h.classList.toggle('scrolled',window.scrollY>60);});
document.getElementById('navToggle').addEventListener('click',()=>{document.getElementById('headerNav').classList.toggle('open');});
document.getElementById('headerNav').querySelectorAll('a').forEach(l=>{l.addEventListener('click',()=>{document.getElementById('headerNav').classList.remove('open');});});
</script>
</body>
</html>
